name: Update morning news

on:
  schedule:
    # KST 오전 7:30 = UTC 22:30 (전날). GitHub Actions 무료 스케줄은 몇 분~수십 분 지연될 수 있음.
    - cron: "30 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit & push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add docs/news.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "morning news $(date -u +%Y-%m-%d)"
            git push
          fi
